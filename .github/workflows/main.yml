name: YouTube Shorts Auto Publisher

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install -r requirements.txt
    - run: sudo apt-get install -y ffmpeg
    - run: python main.py
    
